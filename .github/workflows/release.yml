name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token is stored.
# Triggered by publishing a GitHub Release (or manually via the Actions tab).
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI Project Name: niceparse
#   Owner:             NevermindNilas
#   Repository name:   niceparse
#   Workflow name:     release.yml
#   Environment name:  pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Check metadata
        run: |
          pip install twine
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
